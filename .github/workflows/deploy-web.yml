# Flutter Web → GitHub Pages（公式: upload-pages-artifact + deploy-pages）
#
# リポジトリで一度だけ設定:
#   Settings → Pages → Build and deployment → Source: GitHub Actions
# （「Deploy from a branch: main」だと README だけが表示され、アプリは出ません）
#
# URL: https://<owner>.github.io/<repo>/
# 例: https://ns2pole.github.io/calculus_gacha/
#
# https://docs.github.com/pages/getting-started-with-github-pages/configuring-a-publishing-source-for-your-github-pages-site
name: Deploy Web to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Dependencies
        run: flutter pub get

      - name: Build web (base-href for GitHub Pages)
        run: |
          set -euo pipefail
          REPO_NAME="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"
          if [ "$REPO_NAME" = "$OWNER.github.io" ]; then
            BASE_HREF="/"
          else
            BASE_HREF="/$REPO_NAME/"
          fi
          echo "Using --base-href $BASE_HREF"
          flutter build web --release --base-href "$BASE_HREF"

      - name: SPA fallback for GitHub Pages
        run: cp build/web/index.html build/web/404.html

      - name: Disable Jekyll
        run: touch build/web/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
