# Builds Flutter web and publishes to the gh-pages branch for GitHub Pages.
#
# After the first successful run:
#   Repository → Settings → Pages → Build and deployment → Source: Deploy from a branch
#   Branch: gh-pages / root
#
# Site URL:
#   - Project site: https://<owner>.github.io/<repo>/
#   - User/org site (repo named <owner>.github.io): https://<owner>.github.io/
name: Deploy Web to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Dependencies
        run: flutter pub get

      - name: Build web (base-href for GitHub Pages)
        run: |
          set -euo pipefail
          REPO_NAME="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"
          if [ "$REPO_NAME" = "$OWNER.github.io" ]; then
            BASE_HREF="/"
          else
            BASE_HREF="/$REPO_NAME/"
          fi
          echo "Using --base-href $BASE_HREF"
          flutter build web --release --base-href "$BASE_HREF"

      - name: SPA fallback for GitHub Pages
        run: cp build/web/index.html build/web/404.html

      # Jekyll を無効化（Flutter のアセットで _ 始まりのパスが欠落するのを防ぐ）
      - name: Disable Jekyll
        run: touch build/web/.nojekyll

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
          force_orphan: true
