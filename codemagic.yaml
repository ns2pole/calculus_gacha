# Codemagic: iOS をクラウド Mac（Xcode 26）でビルドし App Store Connect へ提出
#
# Developer Portal 連携（UI）が FORBIDDEN でも動くよう、API Key は環境変数で渡す。
#
# === Codemagic アプリ設定でやること ===
#
# 1. Application → Environment variables → グループ appstore_credentials を作成
#
# 2. 環境変数グループ appstore_credentials に Secret を 1 つだけ追加:
#    APP_STORE_CONNECT_PRIVATE_KEY = AuthKey_ATBD5UGJTG.p8 の全文
#    （Key ID / Issuer ID / Apple ID は下の vars に書いてある）
#
# 3. Team settings → Code signing identities（Developer Portal 連携なしで可）
#    - Upload: Apple Distribution 証明書 (.p12)
#    - Upload: com.joymath の App Store プロビジョニング (.mobileprovision)
#    ※ Fetch は Portal 連携が要るため、手元 Mac からエクスポートして Upload
#
# 4. このファイルを push → アプリで YAML ワークフロー ios-appstore-release を実行
#
#    App Store の "What's New" はリポジトリ直下の release_notes.json を Codemagic が自動で使用する。
#    iOS 審査提出ではプライマリロケール分の "What's New" が必須。
#
# 5. Firebase（Android / iOS ビルド用）— 環境変数グループ firebase_credentials を作成し Secret を追加:
#    GOOGLE_SERVICES_JSON = Firebase Console からダウンロードした google-services.json の全文
#    （改行込みの JSON をそのまま貼り付け。base64 なら GOOGLE_SERVICES_JSON_BASE64 でも可）
#    GOOGLE_SERVICE_INFO_PLIST = Firebase の GoogleService-Info.plist の全文
#    （base64 なら GOOGLE_SERVICE_INFO_PLIST_BASE64 でも可）
#
# 参考: https://docs.codemagic.io/yaml-publishing/app-store-connect/

workflows:
  ios-appstore-release:
    name: iOS App Store (IPA ビルドと審査提出)
    max_build_duration: 120
    # 無料枠（M2 500分/月）を使う場合は mac_mini_m2 に変更（Xcode 26.4 が使えるか要確認）
    instance_type: mac_mini_m2
    environment:
      groups:
        - appstore_credentials
        - firebase_credentials
        - revenuecat_credentials
      vars:
        APP_STORE_CONNECT_KEY_IDENTIFIER: ATBD5UGJTG
        APP_STORE_CONNECT_ISSUER_ID: c64fb6be-f1d2-4e04-80b5-2841def3da52
        APP_STORE_APPLE_ID: "6753078774"
      xcode: 26.4
      flutter: stable
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.joymath
    scripts:
      - name: Flutter pub get
        script: |
          set -e
          flutter pub get
      - name: Inject Firebase Android config
        script: |
          set -e
          dart run tool/inject_google_services_json.dart
      - name: Inject Firebase iOS config
        script: |
          set -e
          dart run tool/inject_google_service_info_plist.dart
      - name: CocoaPods (ios)
        script: |
          set -e
          cd ios && pod install && cd ..
      - name: Flutter build IPA
        script: |
          set -e
          VER_LINE=$(grep '^version:' pubspec.yaml | head -1 | awk '{print $2}' | tr -d "'\"")
          VERSION_NAME="${VER_LINE%+*}"
          if [ -n "${APP_STORE_APPLE_ID:-}" ]; then
            LATEST=$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APPLE_ID")
            VERSION_CODE=$((LATEST + 1))
          else
            VERSION_CODE="${VER_LINE#*+}"
          fi
          echo "Building $VERSION_NAME ($VERSION_CODE)"

          # Flutter 3.44+ が SPM 統合で Xcode プロジェクトを書き換えるため、
          # 先に config-only で更新してから use-profiles を当てる。
          flutter build ios --release --config-only

          xcode-project use-profiles

          if [ ! -f /Users/builder/export_options.plist ]; then
            echo "ERROR: /Users/builder/export_options.plist が生成されていません"
            exit 1
          fi

          echo "=== com.joymath 用プロファイル ==="
          for f in "$HOME/Library/MobileDevice/Provisioning Profiles/"*.mobileprovision; do
            if security cms -D -i "$f" 2>/dev/null | grep -q '7K99YVR868.com.joymath'; then
              echo "--- $f ---"
              security cms -D -i "$f" | grep -E '<key>Name</key>|<key>UUID</key>|applesignin' || true
            fi
          done
          echo "=== export_options.plist ==="
          cat /Users/builder/export_options.plist

          # use-profiles が生成した export_options を渡さないと IPA export で別プロファイルが使われる
          flutter build ipa --release \
            --dart-define=AI_CHAT_ENDPOINT=https://asia-northeast1-joymath-a36a3.cloudfunctions.net/aiChat \
            --dart-define=REVENUECAT_IOS_API_KEY="$REVENUECAT_IOS_API_KEY" \
            --build-name="$VERSION_NAME" \
            --build-number="$VERSION_CODE" \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        # Developer Portal integration 不要（環境変数で認証）
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: false
        submit_to_app_store: true
        cancel_previous_submissions: true
        release_type: AFTER_APPROVAL
